name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache: false

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ matrix.python-version }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.python-version }}-
            ${{ runner.os }}-cargo-

      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check

      - name: Rust clippy (advisory)
        working-directory: rust
        env:
          RUSTFLAGS: ""
        run: cargo clippy --release || true

      - name: Rust unit tests
        working-directory: rust
        env:
          RUSTFLAGS: ""
        run: cargo test --release --lib

      - name: Install maturin & build wheel
        env:
          RUSTFLAGS: ""
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          cd rust && maturin build --release

      - name: Install wheel and Python dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install rust/target/wheels/*.whl
          pip install pytest numpy pandas optuna ccxt

      - name: Install wheel and Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem rust/target/wheels/*.whl | Select-Object -First 1
          pip install $wheel.FullName
          pip install pytest numpy pandas optuna ccxt

      - name: Python tests (pytest)
        run: python -m pytest tests/ -v

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            rust/target/release/build/**/output
            rust/target/release/build/**/stderr
            **/*.log
          retention-days: 7
          if-no-files-found: ignore
